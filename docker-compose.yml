services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: ai-chat-backend
    restart: always
    ports:
      - "9000:9000"
    volumes:
      - ./backend/chat.db:/app/chat.db
      - ./backend/faiss.index:/app/faiss.index
      - ./backend/chunks.pkl:/app/chunks.pkl
      - ./backend/.env:/app/.env
    env_file:
      - ./backend/.env
    networks:
      - ai-network

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: ai-chat-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - ai-network

networks:
  ai-network: