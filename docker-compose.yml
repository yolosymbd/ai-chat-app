services:
  # 后端 FastAPI
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: ai-chat-backend
    restart: always
    ports:
      - "9000:9000"
    volumes:
      - ./backend/chat.db:/app/chat.db
      - ./backend/faiss.index:/app/faiss.index
      - ./backend/chunks.pkl:/app/chunks.pkl
    env_file:
      - ./backend/.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-network

  # 前端 Vue + Nginx
  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: ai-chat-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ai-network

networks:
  ai-network:
    driver: bridge