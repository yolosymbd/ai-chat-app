version: '3.8'

services:
  # 后端 FastAPI
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: ai-chat-backend
    restart: always
    ports:
      - "9000:9000"
    volumes:
      - ./backend:/app
      - ./backend/chat.db:/app/chat.db
      - ./backend/faiss.index:/app/faiss.index
      - ./backend/chunks.pkl:/app/chunks.pkl
    environment:
      - API_KEY=${API_KEY}
    networks:
      - ai-network

  # 前端 Vue（Nginx）
  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: ai-chat-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - ai-network

  # Prometheus：监控（可选但强烈建议）
  prometheus:
    image: prom/prometheus:v2.44.0
    container_name: ai-prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus-data:/prometheus
    command: --config.file=/etc/prometheus/prometheus.yml
    networks:
      - ai-network

networks:
  ai-network:
    driver: bridge